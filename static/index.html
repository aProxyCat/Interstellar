<div id="custom-search-container"></div>

<script>
  // Fetch the HTML content from the external website
  fetch('https://intastella.vercel.app/')
    .then(response => response.text()) // Parse the response as HTML text
    .then(html => {
      // Use DOMParser to parse the HTML response
      const doc = new DOMParser().parseFromString(html, 'text/html');
      
      // Get the search container from the parsed HTML
      const searchBar = doc.querySelector('.search-container');
      
      // If the search bar exists, inject it into your page
      if (searchBar) {
        // Clear any other elements from the container, just insert the search bar
        document.getElementById('custom-search-container').innerHTML = '';
        document.getElementById('custom-search-container').appendChild(searchBar);
      } else {
        console.log('Search container not found!');
      }
    })
    .catch(error => console.error('Error fetching content:', error));
</script>
